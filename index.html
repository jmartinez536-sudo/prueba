<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login de prueba</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --error: #f87171;
      --success: #4ade80;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
      font-weight: 600;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0 0 1.75rem;
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 139, 253, 0.2);
    }

    button {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.25rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: rgba(61, 139, 253, 0.1);
      border: 1px solid rgba(61, 139, 253, 0.25);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .hint code {
      color: var(--accent);
      font-size: 0.85em;
    }

    .message {
      margin-top: 1rem;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: var(--error);
    }

    .message.ok {
      background: rgba(74, 222, 128, 0.12);
      border: 1px solid rgba(74, 222, 128, 0.35);
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Formulario de prueba (sin servidor).</p>

    <form id="loginForm" novalidate>
      <label for="user">Usuario</label>
      <input id="user" name="user" type="text" autocomplete="username" required />

      <label for="pass">Contraseña</label>
      <input id="pass" name="pass" type="password" autocomplete="current-password" required />

      <button type="submit">Entrar</button>
    </form>

    <div id="msg" class="message" role="alert"></div>

    <p class="hint">
      Credenciales de prueba: <code>demo</code> / <code>demo123</code>
    </p>
  </div>

  <script>
    (function () {
      var form = document.getElementById("loginForm");
      var msg = document.getElementById("msg");

      var TEST_USER = "demo";
      var TEST_PASS = "demo123";

      function showMessage(text, ok) {
        msg.textContent = text;
        msg.className = "message show " + (ok ? "ok" : "error");
      }

      function hideMessage() {
        msg.className = "message";
        msg.textContent = "";
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        hideMessage();

        var user = document.getElementById("user").value.trim();
        var pass = document.getElementById("pass").value;

        if (!user || !pass) {
          showMessage("Completa usuario y contraseña.", false);
          return;
        }

        if (user === TEST_USER && pass === TEST_PASS) {
          showMessage("Acceso correcto (solo demostración).", true);
        } else {
          showMessage("Usuario o contraseña incorrectos.", false);
        }
      });
    })();
  </script>
</body>
</html>
